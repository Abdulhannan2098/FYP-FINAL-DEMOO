name: Frontend Test & Deploy

on:
  push:
    paths:
      - "frontend/**"

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test -- --run

      # ── Deploy to autosphere (autospher.store – production domain) ──────────
      - name: Pull Vercel settings (autosphere)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_AUTOSPHERE_PROJECT_ID }}
        run: npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build (autosphere)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_AUTOSPHERE_PROJECT_ID }}
        run: npx vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to production – autospher.store
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_AUTOSPHERE_PROJECT_ID }}
        run: npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      # ── Deploy to autospheree (autospheree-beta.vercel.app – preview URL) ──
      - name: Deploy to preview – autospheree-beta.vercel.app
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
