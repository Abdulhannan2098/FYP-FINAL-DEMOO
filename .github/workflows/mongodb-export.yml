# ─────────────────────────────────────────────────────────────────────────────
# MongoDB Data Export → Google Drive → Email
#
# Pipeline (runs daily at 02:00 UTC or manually):
#   1. Export every MongoDB collection to dated JSON files
#   2. Upload JSON files to a Google Drive folder
#   3. Email a professional report with the Drive link
#   4. Archive the JSON files as a GitHub Actions artifact (30-day backup)
#
# REQUIRED GITHUB SECRETS  (Settings → Secrets and variables → Actions)
# ┌──────────────────────────┬─────────────────────────────────────────────────┐
# │ Secret name              │ Value                                           │
# ├──────────────────────────┼─────────────────────────────────────────────────┤
# │ MONGODB_URI              │ mongodb+srv://user:pass@cluster/DbName          │
# │ GOOGLE_CLIENT_ID         │ OAuth2 client ID from Google Cloud Console      │
# │ GOOGLE_CLIENT_SECRET     │ OAuth2 client secret                            │
# │ GOOGLE_REFRESH_TOKEN     │ Long-lived refresh token (see setup below)      │
# │ GOOGLE_DRIVE_FOLDER_ID   │ ID from the Drive folder URL                   │
# │ EMAIL_USER               │ Gmail address (sender)                          │
# │ EMAIL_PASSWORD           │ Gmail App Password (not your login password)    │
# │ NOTIFICATION_EMAIL       │ Recipient email for the report                  │
# └──────────────────────────┴─────────────────────────────────────────────────┘
#
# WHY OAuth2 INSTEAD OF SERVICE ACCOUNT:
#   Service accounts have no Google Drive storage quota — uploads to My Drive
#   fail with "Service Accounts do not have storage quota." OAuth2 with a
#   refresh token uploads as YOUR Google account, so quota is never an issue.
#
# HOW TO GET GOOGLE_CLIENT_ID & GOOGLE_CLIENT_SECRET:
#   1. console.cloud.google.com → your project → APIs & Services → Credentials
#   2. Create credential → OAuth 2.0 Client ID → Desktop app
#   3. Copy Client ID and Client Secret
#
# HOW TO GET GOOGLE_REFRESH_TOKEN (one-time, ~2 minutes):
#   1. Go to: https://developers.google.com/oauthplayground
#   2. Click the gear icon (top-right) → check "Use your own OAuth credentials"
#   3. Enter your Client ID and Client Secret → Close
#   4. In Step 1, find "Drive API v3" → select "https://www.googleapis.com/auth/drive"
#   5. Click "Authorize APIs" → sign in with your Google account → Allow
#   6. In Step 2, click "Exchange authorization code for tokens"
#   7. Copy the "Refresh token" value → paste as GOOGLE_REFRESH_TOKEN secret
#
# HOW TO GET GOOGLE_DRIVE_FOLDER_ID:
#   Open the target Drive folder → copy the ID from the URL:
#   https://drive.google.com/drive/folders/<THIS-IS-THE-ID>
# ─────────────────────────────────────────────────────────────────────────────

name: MongoDB Data Export

on:
  # ── Scheduled run ────────────────────────────────────────────────────────────
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day

  # ── Manual trigger (Actions tab → "Run workflow") ────────────────────────────
  workflow_dispatch:
    inputs:
      retention_days:
        description: 'GitHub artifact retention in days (1–90)'
        required: false
        default: '30'

# Only one export runs at a time — never cancel a running export
concurrency:
  group: mongodb-export
  cancel-in-progress: false

jobs:
  export-upload-notify:
    name: Export → Drive → Email
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── 1. Checkout (to access scripts) ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 3. Install minimal deps for MongoDB export ────────────────────────────
      #    Deliberately avoids backend's full package.json (canvas, sharp, etc.)
      - name: Install export dependencies
        run: |
          mkdir -p /tmp/mongo-export
          cp backend/scripts/exportMongoData.js /tmp/mongo-export/
          cd /tmp/mongo-export
          npm init -y --quiet
          npm install --save mongodb dotenv

      # ── 4. Export every MongoDB collection to JSON ────────────────────────────
      - name: Export MongoDB collections
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          EXPORT_OUTPUT_DIR: ${{ github.workspace }}/exports
          NODE_ENV: production
        run: |
          cd /tmp/mongo-export
          node exportMongoData.js

      # ── 5. Install deps for Drive upload + email notification ─────────────────
      - name: Install Drive & email dependencies
        run: |
          mkdir -p /tmp/notify
          cp backend/scripts/uploadAndNotify.js /tmp/notify/
          cd /tmp/notify
          npm init -y --quiet
          npm install --save googleapis nodemailer dotenv

      # ── 6. Upload JSON files to Google Drive & send email report ──────────────
      - name: Upload to Google Drive & send email report
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          EXPORT_OUTPUT_DIR: ${{ github.workspace }}/exports
          NODE_ENV: production
        run: |
          cd /tmp/notify
          node uploadAndNotify.js

      # ── 7. List exported files in the Actions log ─────────────────────────────
      - name: List exported files
        if: success()
        run: |
          echo "📁 Exported files:"
          find "${{ github.workspace }}/exports" -type f | sort

      # ── 8. Archive JSON files as a GitHub Actions artifact (fallback copy) ────
      - name: Upload export artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mongodb-export-${{ github.run_number }}
          path: ${{ github.workspace }}/exports/
          retention-days: ${{ github.event.inputs.retention_days || 30 }}
          if-no-files-found: warn

      # ── 9. Write a rich summary to the Actions run page ──────────────────────
      - name: Write job summary
        if: always()
        run: |
          DATE=$(date +%Y-%m-%d)
          MANIFEST="${{ github.workspace }}/exports/${DATE}/_manifest.json"

          echo "## 📦 AutoSphere — MongoDB Export  •  ${DATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| MongoDB Export | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Google Drive Upload | ✅ Uploaded |" >> $GITHUB_STEP_SUMMARY
          echo "| Email Notification | ✅ Sent |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "$MANIFEST" ]; then
            echo "### Export Manifest" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat "$MANIFEST" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Manifest file not found — check step logs above." >> $GITHUB_STEP_SUMMARY
          fi
