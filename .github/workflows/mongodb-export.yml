# ─────────────────────────────────────────────────────────────────────────────
# MongoDB Data Export → Supabase Storage → Email
#
# Pipeline (runs daily at 02:00 UTC or manually):
#   1. Export every MongoDB collection to dated JSON files
#   2. Upload JSON files to Supabase Storage bucket
#   3. Email a professional report with file links
#   4. Archive the JSON files as a GitHub Actions artifact (30-day backup)
#
# REQUIRED GITHUB SECRETS  (Settings → Secrets and variables → Actions)
# ┌──────────────────────────────┬────────────────────────────────────────────┐
# │ Secret name                  │ Where to get it                            │
# ├──────────────────────────────┼────────────────────────────────────────────┤
# │ MONGODB_URI                  │ Your MongoDB connection string             │
# │ SUPABASE_URL                 │ Supabase project → Settings → API → URL   │
# │ SUPABASE_SERVICE_ROLE_KEY    │ Supabase project → Settings → API →       │
# │                              │   service_role (secret key)                │
# │ SUPABASE_BUCKET              │ Name of your storage bucket (e.g.          │
# │                              │   "db-exports") — create it first         │
# │ EMAIL_USER                   │ Gmail address used as sender               │
# │ EMAIL_PASSWORD               │ Gmail App Password (not login password)    │
# │ NOTIFICATION_EMAIL           │ Recipient email for the export report      │
# └──────────────────────────────┴────────────────────────────────────────────┘
#
# SUPABASE SETUP (one-time, ~3 minutes):
#   1. supabase.com → New project
#   2. Storage → New bucket → name it (e.g. "db-exports") → Public: ON
#   3. Settings → API → copy "Project URL" and "service_role" key
#   4. Add all three as GitHub Secrets above
# ─────────────────────────────────────────────────────────────────────────────

name: MongoDB Data Export

on:
  # ── Scheduled run ────────────────────────────────────────────────────────────
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day

  # ── Manual trigger (Actions tab → "Run workflow") ────────────────────────────
  workflow_dispatch:
    inputs:
      retention_days:
        description: 'GitHub artifact retention in days (1–90)'
        required: false
        default: '30'

# Only one export runs at a time — never cancel a running export
concurrency:
  group: mongodb-export
  cancel-in-progress: false

jobs:
  export-upload-notify:
    name: Export → Supabase → Email
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 3. Install minimal deps for MongoDB export ────────────────────────────
      #    Avoids backend's full package.json (canvas, sharp, face-api, etc.)
      - name: Install export dependencies
        run: |
          mkdir -p /tmp/mongo-export
          cp backend/scripts/exportMongoData.js /tmp/mongo-export/
          cd /tmp/mongo-export
          npm init -y --quiet
          npm install --save mongodb dotenv

      # ── 4. Export every MongoDB collection to JSON ────────────────────────────
      - name: Export MongoDB collections
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          EXPORT_OUTPUT_DIR: ${{ github.workspace }}/exports
          NODE_ENV: production
        run: |
          cd /tmp/mongo-export
          node exportMongoData.js

      # ── 5. Install deps for Supabase upload + email ───────────────────────────
      - name: Install Supabase & email dependencies
        run: |
          mkdir -p /tmp/notify
          cp backend/scripts/uploadAndNotify.js /tmp/notify/
          cd /tmp/notify
          npm init -y --quiet
          npm install --save @supabase/supabase-js nodemailer dotenv

      # ── 6. Upload to Supabase Storage & send email report ─────────────────────
      - name: Upload to Supabase & send email report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          EXPORT_OUTPUT_DIR: ${{ github.workspace }}/exports
          NODE_ENV: production
        run: |
          cd /tmp/notify
          node uploadAndNotify.js

      # ── 7. List exported files in the Actions log ─────────────────────────────
      - name: List exported files
        if: success()
        run: |
          echo "📁 Exported files:"
          find "${{ github.workspace }}/exports" -type f | sort

      # ── 8. Archive JSON files as GitHub artifact (30-day fallback copy) ───────
      - name: Upload export artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mongodb-export-${{ github.run_number }}
          path: ${{ github.workspace }}/exports/
          retention-days: ${{ github.event.inputs.retention_days || 30 }}
          if-no-files-found: warn

      # ── 9. Write summary to Actions run page ──────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          DATE=$(date +%Y-%m-%d)
          MANIFEST="${{ github.workspace }}/exports/${DATE}/_manifest.json"

          echo "## 📦 AutoSphere — MongoDB Export  •  ${DATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| MongoDB Export     | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Supabase Upload    | ✅ Uploaded  |" >> $GITHUB_STEP_SUMMARY
          echo "| Email Notification | ✅ Sent      |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "$MANIFEST" ]; then
            echo "### Export Manifest" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat "$MANIFEST" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Manifest file not found — check step logs above." >> $GITHUB_STEP_SUMMARY
          fi
