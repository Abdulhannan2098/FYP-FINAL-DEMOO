# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.microservices.yml
#
# Runs ONLY the two Python microservices.
# The Node.js monolith continues to run normally (npm start / npm run dev).
#
# Usage:
#   docker compose -f docker-compose.microservices.yml up --build
#   docker compose -f docker-compose.microservices.yml down
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Notification Service (port 8001) ──────────────────────────────────────
  notification-service:
    build:
      context: ./microservices/notification-service
      dockerfile: Dockerfile
    container_name: autosphere-notification-svc
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      API_KEY: ${NOTIFICATION_SERVICE_API_KEY:-autosphere-internal-notify-key}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM:-}
      BRAND_NAME: ${BRAND_NAME:-AutoSphere}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@autosphere.com}
      VENDOR_SUPPORT_EMAIL: ${VENDOR_SUPPORT_EMAIL:-vendor-support@autosphere.com}
      PRIMARY_COLOR: ${EMAIL_PRIMARY_COLOR:-#991B1B}
      DARK_BG: ${EMAIL_DARK_BG:-#111827}
      CURRENCY: ${CURRENCY:-PKR}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Analytics Service (port 8002) ─────────────────────────────────────────
  analytics-service:
    build:
      context: ./microservices/analytics-service
      dockerfile: Dockerfile
    container_name: autosphere-analytics-svc
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      API_KEY: ${ANALYTICS_SERVICE_API_KEY:-autosphere-internal-analytics-key}
      MONGODB_URI: ${MONGODB_URI}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
